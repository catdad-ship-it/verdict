app = "verdict-bnieman"
primary_region = "iad"

[build]
  # NEXT_PUBLIC_ vars must be build-time args so Next.js can bake them into the bundle.
  # These are publishable keys — safe to expose publicly per Supabase docs.
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = "https://xdwitnnqkzxhrboczjdu.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_TaVws2SsGgfd9Wk_LLLgnQ_Fiogkg_N"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
